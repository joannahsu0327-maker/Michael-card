<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael｜謝承諺 專業名片 V1</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <script>
        const Michael_DATA = {
            LIFF_ID: "2009927947-HNfHAq1D",
            BASE_URL: "https://joannahsu0327-maker.github.io/Michael-card/",
            IMG_MAIN: "Michael_IMAGE.jpg",
            IMG_INTRO: "CLO_IMAGE.jpg",
            name: "Michael｜謝承諺",
            title: "工業電子生產設計 | 消防設備",
            intro: "智能遙控消防機器人\n強化救災效率，守護生命安全",
            feature_Title: "消防設備服務項目", 
            item1: "🏭 大型廠房防火安全",
            item2: "🏗️ 戶外建案防火安全",
            item3: "🤝 社會公益捐贈",
            item4: "🌍 ESG 永續治理",
            url_Booking: "https://line.me/ti/p/jZWTSirci1",
            url_Web: "https://www.craneparts.com.tw/",
            phone: "0987305388"
        };

        async function main() {
            try {
                await liff.init({ liffId: Michael_DATA.LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                const ts = "?t=" + Date.now();
                const res = await liff.shareTargetPicker([{
                    "type": "flex", 
                    "altText": "您好，這是 " + Michael_DATA.name + " 的專業名片",
                    "contents": {
                        "type": "carousel",
                        "contents": [
                            { 
                                "type": "bubble", 
                                "hero": { "type": "image", "url": Michael_DATA.BASE_URL + Michael_DATA.IMG_MAIN + ts, "size": "full", "aspectRatio": "3:4", "aspectMode": "cover" }, 
                                "body": { "type": "box", "layout": "vertical", "contents": [ 
                                    { "type": "text", "text": Michael_DATA.name, "weight": "bold", "size": "xl" }, 
                                    { "type": "text", "text": Michael_DATA.title, "size": "sm", "color": "#fb966e", "weight": "bold" } 
                                ] } 
                            },
                            { 
                                "type": "bubble", 
                                "hero": { "type": "image", "url": Michael_DATA.BASE_URL + Michael_DATA.IMG_INTRO + ts, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" }, 
                                "body": { "type": "box", "layout": "vertical", "spacing": "lg", "contents": [
                                    { "type": "text", "text": Michael_DATA.intro, "size": "xs", "color": "#888888", "wrap": true },
                                    { "type": "text", "text": Michael_DATA.feature_Title, "weight": "bold", "size": "lg", "color": "#fb966e" },
                                    { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                                        { "type": "text", "text": Michael_DATA.item1, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": Michael_DATA.item2, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": Michael_DATA.item3, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": Michael_DATA.item4, "size": "md", "weight": "bold" }
                                    ]}
                                ]},
                                "footer": { "type": "box", "layout": "vertical", "contents": [ 
                                    { "type": "button", "style": "primary", "color": "#fb966e", "action": { "type": "uri", "label": "預約諮詢", "uri": Michael_DATA.url_Booking } } 
                                ] }
                            },
                            { 
                                "type": "bubble", 
                                "body": { "type": "box", "layout": "vertical", "spacing": "md", "contents": [
                                    { "type": "text", "text": "與我聯繫", "weight": "bold", "size": "lg" }, { "type": "separator" },
                                    { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                                        { "type": "button", "style": "primary", "color": "#fb966e", "action": { "type": "uri", "label": "撥打電話", "uri": "tel:" + Michael_DATA.phone } },
                                        { "type": "button", "style": "secondary", "color": "#EEEEEE", "action": { "type": "uri", "label": "加 LINE 好友", "uri": Michael_DATA.url_Booking } },
                                        { "type": "button", "style": "secondary", "color": "#E8F0FE", "action": { "type": "uri", "label": "官方網站", "uri": Michael_DATA.url_Web } },
                                        { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "📤 分享名片", "uri": "line://app/" + Michael_DATA.LIFF_ID } }
                                    ]}
                                ]}
                            }
                        ]
                    }
                }]);

                if (res) { liff.closeWindow(); }
            } catch (err) { 
                console.error(err);
                alert("啟動失敗，請檢查權限或網址設定");
            }
        }
        main();
    </script>
</body>
</html>
